# ============================================================
# TaskClaw — Docker Compose (plain PostgreSQL stack)
# ============================================================
#
# Quick start:
#   cp .env.example .env
#   cp backend/.env.example backend/.env
#   cp frontend/.env.example frontend/.env
#   docker compose up -d
#
# Pin a version:
#   TASKCLAW_VERSION=v1.0.0 docker compose up -d
#
# Stack: postgres (pgvector) + minio (S3 storage) + redis + backend + frontend + ollama.
# No Supabase — auth is local (NestJS/JWT), storage is MinIO, realtime is pg LISTEN/NOTIFY + SSE.
# ============================================================

name: taskclaw

services:
  backend:
    image: taskclaw/backend:${TASKCLAW_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-3003}:3003"
    env_file: ./backend/.env
    environment:
      EDITION: community
      # Docker-network overrides (so containers reach each other by service name)
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      REDIS_URL: redis://redis:6379
      AUTH_LOCAL: "true"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # PRD §10.1 — shadow-write task_runs alongside BullMQ.
      FEATURE_TASK_RUNS_V2: ${FEATURE_TASK_RUNS_V2:-true}
    volumes:
      - ./backend/dist:/app/dist
      # Opt-in read-only mounts for the Skills Sync local-folder runner.
      - ${SKILLS_HOST_DIR:-/tmp}:/host-skills:ro
      - ${WORKSPACE_HOST_DIR:-/tmp}:/host-workspace:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    user: "1000:1000"

  frontend:
    image: taskclaw/frontend:${TASKCLAW_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3002}:3002"
    env_file: ./frontend/.env
    environment:
      NEXT_PUBLIC_EDITION: community
      NEXT_PUBLIC_API_URL: http://backend:3003
    depends_on:
      - backend
    restart: unless-stopped
    user: "1000:1000"

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      # Create required extensions on first init (pgvector, uuid-ossp, pgcrypto).
      - ./docker/volumes/db/init-extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: taskclaw-ollama-1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
  db_data:
  minio_data:
  ollama_data:
