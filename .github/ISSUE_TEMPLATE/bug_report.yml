name: Bug Report
description: Report a bug to help us improve TaskClaw
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or error logs.

  - type: input
    id: version
    attributes:
      label: TaskClaw version
      placeholder: "e.g. v0.1.0 or latest"
    validations:
      required: true

  - type: dropdown
    id: edition
    attributes:
      label: Edition
      options:
        - Community (self-hosted)
        - Cloud
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - npx taskclaw
        - Docker Compose (quickstart)
        - Docker Compose (BYO Supabase)
        - Local development
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "e.g. Chrome 120, Firefox 121, Safari 17"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14, Ubuntu 22.04, Windows 11"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the problem (Docker logs, error messages, etc).
