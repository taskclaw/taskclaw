name: Feature Request
description: Suggest a feature or improvement for TaskClaw
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please fill out the form below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like. Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Kanban Board
        - AI Chat
        - Integrations
        - Knowledge Base
        - MCP Server
        - API / Webhooks
        - UI / Design
        - Performance
        - Other
    validations:
      required: true

  - type: checkboxes
    id: integration
    attributes:
      label: Integration contribution
      description: If this is a new integration, would you like to build it?
      options:
        - label: "I'd like to contribute this feature / integration"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any mockups, screenshots, or other context.
