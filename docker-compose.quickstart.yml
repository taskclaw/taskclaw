# ============================================================
# TaskClaw — Quick Start (zero-config, plain PostgreSQL stack)
# ============================================================
#
# Usage:
#   docker compose -f docker-compose.quickstart.yml up -d
#
# Open http://localhost:3000   (login: super@admin.com / password123)
# Stop:   docker compose -f docker-compose.quickstart.yml down
# Reset:  docker compose -f docker-compose.quickstart.yml down -v
#
# ── Host portability ───────────────────────────────────────
# Single-origin and host-portable: the Next.js frontend is the only public
# entry point and proxies /api -> backend over the Docker network. Set ONE
# variable, SITE_URL, to run on localhost, any IP, or a domain. Everything
# (CORS, Server Actions allowed-origin, auth links) derives from it.
#   Default:  http://localhost:3000
#   Example:  SITE_URL=http://203.0.113.10:3000 docker compose -f docker-compose.quickstart.yml up -d
# For plain-HTTP IP installs also set COOKIE_SECURE=false (default here).
#
# SECURITY: ships hardcoded dev keys. For production regenerate JWT_SECRET /
# ENCRYPTION_KEY / POSTGRES_PASSWORD / MinIO creds.
# ============================================================

name: taskclaw

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/volumes/db/init-extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  backend:
    image: taskclaw/backend:${TASKCLAW_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "3003"
      EDITION: community
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      JWT_SECRET: "${JWT_SECRET:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6}"
      AUTH_LOCAL: "true"
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      CORS_ORIGIN: ${SITE_URL:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      # Browser-facing URL for uploaded files. For non-localhost installs, set to
      # http://<host>:9000 (or a proxied path) so attachments load in the browser.
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      QUICKSTART: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: taskclaw/frontend:${TASKCLAW_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # The frontend is the single public origin and proxies /api -> backend.
    ports:
      - "${EXTERNAL_PORT:-3000}:3002"
    environment:
      NEXT_PUBLIC_EDITION: community
      # Server-side calls reach the backend directly over the Docker network.
      INTERNAL_API_URL: http://backend:3003
      # Drives Server Actions allowed-origin + auth links (host-portable).
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      # Plain-HTTP IP installs need this false (localhost is exempt).
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  minio_data:
