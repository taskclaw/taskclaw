_format_version: "2.1"

services:
# ── Backend API (NestJS) ───────────────────────────────────
- name: backend-api
  url: http://backend:3003
  routes:
  - name: backend-api
    paths:
    - /api
    strip_path: true

# ── Supabase Auth (GoTrue) ─────────────────────────────────
- name: auth-v1
  url: http://auth:9999
  routes:
  - name: auth-v1
    paths:
    - /auth/v1
    strip_path: true

# ── Supabase REST (PostgREST) ──────────────────────────────
- name: rest-v1
  url: http://rest:3000
  routes:
  - name: rest-v1
    paths:
    - /rest/v1
    strip_path: true

# ── Supabase Storage ───────────────────────────────────────
- name: storage-v1
  url: http://storage:5000
  routes:
  - name: storage-v1
    paths:
    - /storage/v1
    strip_path: true

# ── Frontend (Next.js) — catch-all, must be last ──────────
- name: frontend
  url: http://frontend:3002
  routes:
  - name: frontend
    paths:
    - /
    strip_path: false
