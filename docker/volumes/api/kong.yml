_format_version: "2.1"

services:
- name: rest-v1
  url: http://rest:3000
  routes:
  - name: rest-v1
    paths:
    - /rest/v1
    strip_path: true

- name: auth-v1
  url: http://auth:9999
  routes:
  - name: auth-v1
    paths:
    - /auth/v1
    strip_path: true

- name: storage-v1
  url: http://storage:5000
  routes:
  - name: storage-v1
    paths:
    - /storage/v1
    strip_path: true

- name: realtime-v1
  # Realtime mounts its socket at /socket; the upstream URL must include it so
  # Kong forwards /realtime/v1/websocket -> realtime:4000/socket/websocket.
  # Host must resolve to the seeded tenant (realtime-dev) — see the realtime
  # service's network alias in docker-compose.yml.
  url: http://realtime-dev:4000/socket
  routes:
  - name: realtime-v1
    paths:
    - /realtime/v1
    strip_path: true

- name: meta
  url: http://meta:8080
  routes:
  - name: meta
    paths:
    - /pg
    strip_path: true
